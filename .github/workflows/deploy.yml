name: Build and Deploy NotionNext

on:
  push:
    tags:
      - '*blog*'  # 监听你的分支  

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取代码
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. 准备 Node.js 环境
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      # 3. 安装依赖 (在 GitHub 的虚拟机上跑，不耗你服务器资源)
      - name: Install Dependencies
        run: yarn install

      # 4. 编译 (这是最耗内存的一步)
      - name: Build Project
        env:
          # 如果你的 NotionNext 版本在编译时需要获取数据，必须加上这个 ID
          NOTION_PAGE_ID: ${{ vars.NOTION_PAGE_ID }} 
          NEXT_PUBLIC_THEME: ${{ vars.NEXT_PUBLIC_THEME }} # 这里根据你的 endspace 主题配置，或者在 actions 里不写，读你代码里的配置
        run: |
          echo "Page ID is ${{ vars.NOTION_PAGE_ID }}"
          echo "Theme is ${{ vars.NEXT_PUBLIC_THEME }}"
          # 备份原始 package.json
          cp package.json package.json.original
          
          yarn build
          
          # 构建后强制恢复原始 package.json（Next.js 可能会修改它）
          cp package.json.original package.json
          rm package.json.original
          
          # 删除 .next 目录内可能存在的 package.json（防止 rsync 覆盖）
          find .next -name "package.json" -delete 2>/dev/null || true
          
          echo "✅ Verifying root package.json content:"
          head -n 20 package.json
          echo ""
          echo "✅ Checking package.json has 'scripts' field:"
          grep -q '"scripts"' package.json && echo "OK: scripts field found" || echo "ERROR: scripts field missing!"

      # 5. 准备同步目录 (将所有需要同步的文件放到一个临时目录，避免路径混乱)
      - name: Prepare Deploy Directory
        run: |
          mkdir -p deploy_temp
          
          # 复制必要的文件到临时目录
          cp -r .next deploy_temp/
          cp -r public deploy_temp/
          cp -r lib deploy_temp/
          cp -r themes deploy_temp/
          cp -r conf deploy_temp/           # blog.config.js 依赖此目录下的配置文件
          cp package.json deploy_temp/
          cp yarn.lock deploy_temp/
          cp next.config.js deploy_temp/
          cp blog.config.js deploy_temp/
          
          # 最终验证部署目录结构
          echo "✅ Final package.json in deploy_temp:"
          head -n 5 deploy_temp/package.json
          echo ""
          echo "✅ Checking conf/ directory:"
          ls -la deploy_temp/conf/

      # 6. 将编译产物同步到服务器
      - name: Deploy to Server via Rsync
        uses: easingthemes/ssh-deploy@main
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          ARGS: "-rlgoDzvO --delete"
          SOURCE: "deploy_temp/"
          REMOTE_HOST: ${{ secrets.SERVER_IP }}
          REMOTE_USER: ${{ secrets.SERVER_USER }}
          TARGET: "/home/xueayi/NotionNext/"
          EXCLUDE: "/node_modules/"

      # 7. 在服务器上重启服务
      - name: Restart Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/xueayi/NotionNext
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"  # 加载 nvm
            [ -s "$NVM_DIR/bash_completion" ] && \. "$NVM_DIR/bash_completion"  # 加载 nvm bash_completion

            # 确认一下环境是否加载成功 (调试用)
            echo "Current Node version:"
            node -v
            echo "Current Yarn version:"
            yarn -v
            
            # 验证 package.json 是否完整
            echo "✅ Verifying package.json on server:"
            head -n 10 package.json
            if grep -q '"scripts"' package.json; then
              echo "✅ package.json is complete!"
            else
              echo "❌ ERROR: package.json is incomplete! Aborting deployment."
              exit 1
            fi
            
            # 1. 安装生产环境依赖 (服务器只需运行，不需要 devDependencies，这步很快且省内存)
            yarn install --production

            # 2. 停止旧进程 (防止端口冲突，同时处理 IPv4 和 IPv6)
            echo "Stopping old process..."
            # 使用 fuser 杀掉所有占用 3000 端口的进程（包括 IPv6）
            fuser -k 3000/tcp 2>/dev/null || true
            sleep 2
            # 如果 fuser 不可用，使用备用方案
            if command -v fuser > /dev/null 2>&1; then
              fuser -k 3000/tcp 2>/dev/null || true
            else
              # 备用方案：使用 ss + kill
              ss -tlnp 'sport = :3000' | grep -oP 'pid=\K\d+' | xargs -r kill -9 2>/dev/null || true
            fi

            # 3. 启动新进程
            echo "Starting new process..."
            nohup yarn start >/dev/null 2>&1 &
            
            # 等待几秒确认进程启动
            sleep 3
            if lsof -i:3000 > /dev/null 2>&1; then
              echo "✅ Server started successfully on port 3000!"
            else
              echo "⚠️ Warning: Server may not have started. Check logs."
            fi
            
            echo "🎉 Deployment finished!"